name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.24"

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make test

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: make build VERSION=${{ steps.version.outputs.VERSION }}

      - name: Build .app bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: make app

      - name: Build DMG
        run: make dmg

      - name: Rename binary
        run: mv bin/local-rag bin/local-rag-darwin-arm64

      - name: Zip .app bundle
        run: cd bin && zip -r local-rag-darwin-arm64.app.zip local-rag.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            bin/local-rag-darwin-arm64
            bin/local-rag-darwin-arm64.app.zip
            bin/local-rag.dmg

  # ── Linux build (uncomment when ready) ──────────────────────────────────
  #
  # build-linux:
  #   needs: test
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-go@v5
  #       with:
  #         go-version: ${{ env.GO_VERSION }}
  #     - name: Extract version from tag
  #       id: version
  #       run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
  #     - name: Build binary
  #       run: make build VERSION=${{ steps.version.outputs.VERSION }}
  #     - name: Rename binary
  #       run: mv bin/local-rag bin/local-rag-linux-amd64
  #     - name: Upload artifacts
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: linux-amd64
  #         path: bin/local-rag-linux-amd64

  release:
    needs: [build-macos]
    # Add build-linux to needs when uncommenting Linux job
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            artifacts/local-rag-darwin-arm64 \
            artifacts/local-rag-darwin-arm64.app.zip \
            artifacts/local-rag.dmg
